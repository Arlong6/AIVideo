name: Long-form Video Generation

on:
  schedule:
    # Run daily at 06:00 UTC (14:00 Taiwan) — 1 long-form video per day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: 'Override topic (e.g. "D.B.庫柏劫機案"). Leave blank for auto-pick.'
        required: false
        default: ''
      source_tag:
        description: 'Source tag (e.g. "shorts_upgrade") for video_log.'
        required: false
        default: ''

jobs:
  generate-longform:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk ffmpeg

      - name: Set up credentials
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle
          echo "${{ secrets.CLIENT_SECRETS_B64 }}" | base64 -d > client_secrets.json
          python3 -c "
          import pickle
          from google.auth.transport.requests import Request
          with open('youtube_token.pickle', 'rb') as f:
              creds = pickle.load(f)
          if creds.expired and creds.refresh_token:
              creds.refresh(Request())
              with open('youtube_token.pickle', 'wb') as f:
                  pickle.dump(creds, f)
              print('YouTube token refreshed')
          "

      - name: Generate long-form video (multi-agent)
        env:
          OVERRIDE_TOPIC: ${{ github.event.inputs.topic }}
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, '.')

          # Guard: skip if a long-form already published today (KST).
          # Bypassed when OVERRIDE_TOPIC is set — manual topic = intentional.
          override = os.environ.get('OVERRIDE_TOPIC', '').strip()
          if not override:
              import json
              from datetime import datetime, timezone, timedelta
              kst = timezone(timedelta(hours=9))
              today_kst = datetime.now(kst).strftime('%Y-%m-%d')
              try:
                  with open('video_log.json') as _f:
                      _videos = json.load(_f).get('videos', [])
              except FileNotFoundError:
                  _videos = []

              def _kst_date(v):
                  s = v.get('uploaded_at', '')
                  if not s:
                      return ''
                  try:
                      dt = datetime.fromisoformat(s.replace('Z', '+00:00'))
                      if dt.tzinfo is None:
                          dt = dt.replace(tzinfo=timezone.utc)
                      return dt.astimezone(kst).strftime('%Y-%m-%d')
                  except Exception:
                      return s[:10]

              _today = [v for v in _videos
                        if v.get('duration_s', 0) > 600
                        and _kst_date(v) == today_kst]
              if _today:
                  v = _today[0]
                  vid = v.get('video_id', '?')
                  top = v.get('topic', '')[:50]
                  msg = f'⏭️ [longform] Guard skipped — {vid} already published today ({top})'
                  print(f'[guard] {msg}')
                  try:
                      from telegram_notify import _send_raw
                      _send_raw(msg)
                  except Exception as _e:
                      print(f'[guard] Telegram notify failed: {_e}')
                  sys.exit(0)

          from agents.orchestrator import produce_longform
          source_tag = os.environ.get('SOURCE_TAG', '').strip()
          if override:
              topic = override
              print(f'[manual] Using override topic: {topic}')
          else:
              from topic_manager import pick_topic, save_today_reserved
              topic = pick_topic(refresh_news=True)
              save_today_reserved(topic)
          produce_longform(topic, upload=True, slot=2, source=source_tag)
          PYEOF

      - name: Fetch analytics and send daily report
        run: |
          python3 -c "
          from dotenv import load_dotenv
          load_dotenv()
          from youtube_uploader import _get_credentials
          from googleapiclient.discovery import build
          from analytics_tracker import fetch_and_update_stats, send_daily_report, check_copyright_issues
          from youtube_uploader import process_pending_comments
          try:
              creds = _get_credentials()
              yt = build('youtube', 'v3', credentials=creds) if creds else None
              if yt:
                  fetch_and_update_stats(yt)
                  check_copyright_issues(yt)
                  posted, pending = process_pending_comments(yt)
                  print(f'Pending comments: posted={posted} still_pending={pending}')
              send_daily_report(youtube=yt)
          except Exception as e:
              print(f'[WARN] Analytics step failed: {e}')
          "
        continue-on-error: true

      - name: Commit updated data files
        run: |
          git config user.name "AI Video Bot"
          git config user.email "bot@aivideo.local"
          git add used_topics.json video_log.json today_topics.json pending_comments.json || true
          git diff --staged --quiet || git commit -m "chore: update data files after long-form generation"
          git pull --rebase || true
          git push || true
