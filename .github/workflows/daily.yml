name: Daily Video Generation

on:
  schedule:
    - cron: '0 18 * * *'   # 02:00 AM Taiwan (UTC+8) = 18:00 UTC
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"

    permissions:
      contents: write        # for committing used_topics.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up credentials
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          CLIENT_SECRETS_B64: ${{ secrets.CLIENT_SECRETS_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << 'PYEOF'
          import base64, os
          open('youtube_token.pickle','wb').write(base64.b64decode(os.environ['YOUTUBE_TOKEN_B64']))
          open('client_secrets.json','wb').write(base64.b64decode(os.environ['CLIENT_SECRETS_B64']))
          env_content = "\n".join([
              f"ANTHROPIC_API_KEY={os.environ['ANTHROPIC_API_KEY']}",
              f"PEXELS_API_KEY={os.environ['PEXELS_API_KEY']}",
              f"ELEVENLABS_API_KEY={os.environ['ELEVENLABS_API_KEY']}",
              f"PIXABAY_API_KEY={os.environ.get('PIXABAY_API_KEY','')}",
              f"TELEGRAM_BOT_TOKEN={os.environ.get('TELEGRAM_BOT_TOKEN','')}",
              f"TELEGRAM_CHAT_ID={os.environ.get('TELEGRAM_CHAT_ID','')}",
          ])
          open('.env','w').write(env_content)
          print("Credentials set up OK")
          PYEOF

      - name: Debug credentials
        run: |
          python3 -c "
          from dotenv import load_dotenv
          import os
          load_dotenv()
          key = os.getenv('ANTHROPIC_API_KEY', '')
          print(f'Anthropic key length: {len(key)}')
          print(f'Key prefix: {key[:15]}...')
          print('.env exists:', os.path.exists('.env'))
          print('.env content length:', len(open('.env').read()) if os.path.exists('.env') else 0)
          pexels = os.getenv('PEXELS_API_KEY', '')
          print(f'Pexels key length: {len(pexels)}')
          "

      - name: Video 1 — slot 1 (publishes at 10:00 AM Taiwan)
        run: python generate.py --auto --upload --slot 1

      - name: Video 2 — slot 2 (publishes at 18:00 PM Taiwan)
        run: python generate.py --auto --upload --slot 2

      - name: Commit updated topic tracking files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json topics.json pexels_seen_ids.json || true
          git diff --staged --quiet || git commit -m "chore: update topic tracking [skip ci]"
          git push
