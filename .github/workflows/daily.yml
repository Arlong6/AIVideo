name: Daily Video Generation

on:
  schedule:
    - cron: '0 18 * * *'   # 02:00 AM Taiwan (UTC+8) = 18:00 UTC
  workflow_dispatch:
    inputs:
      slot_a:
        description: 'First slot (1=10am 2=2pm 3=6pm 4=10pm TW)'
        required: false
        default: '1'
      slot_b:
        description: 'Second slot (1=10am 2=2pm 3=6pm 4=10pm TW)'
        required: false
        default: '3'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      VIDEO_ENGINE: "remotion"
      REMOTION_PROJECT_DIR: "${{ github.workspace }}/nihongo-reels/nihongo-reels"

    permissions:
      contents: write        # for committing used_topics.json back to repo

    steps:
      - name: Checkout AIvideo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Remotion project (nihongo-reels)
        uses: actions/checkout@v4
        with:
          repository: Arlong6/nihongo-manabi
          path: nihongo-reels
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js (for Remotion)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nihongo-reels/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: |
          cd nihongo-reels/nihongo-reels
          npm ci
          chmod +x scripts/render-crime.sh

      - name: Set up credentials
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          CLIENT_SECRETS_B64: ${{ secrets.CLIENT_SECRETS_B64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << 'PYEOF'
          import base64, os
          open('youtube_token.pickle','wb').write(base64.b64decode(os.environ['YOUTUBE_TOKEN_B64']))
          open('client_secrets.json','wb').write(base64.b64decode(os.environ['CLIENT_SECRETS_B64']))
          # Auto-refresh YouTube token if expired
          import pickle
          from google.auth.transport.requests import Request
          with open('youtube_token.pickle', 'rb') as f:
              creds = pickle.load(f)
          if creds.expired and creds.refresh_token:
              creds.refresh(Request())
              with open('youtube_token.pickle', 'wb') as f:
                  pickle.dump(creds, f)
              print("YouTube token refreshed")
          env_content = "\n".join([
              f"GEMINI_API_KEY={os.environ.get('GEMINI_API_KEY','')}",
              f"ANTHROPIC_API_KEY={os.environ['ANTHROPIC_API_KEY']}",
              f"PEXELS_API_KEY={os.environ['PEXELS_API_KEY']}",
              f"ELEVENLABS_API_KEY={os.environ['ELEVENLABS_API_KEY']}",
              f"PIXABAY_API_KEY={os.environ.get('PIXABAY_API_KEY','')}",
              f"TELEGRAM_BOT_TOKEN={os.environ.get('TELEGRAM_BOT_TOKEN','')}",
              f"TELEGRAM_CHAT_ID={os.environ.get('TELEGRAM_CHAT_ID','')}",
          ])
          open('.env','w').write(env_content)
          print("Credentials set up OK")
          PYEOF

      - name: Shorts 1 — first slot
        run: python generate.py --auto --upload --slot ${{ github.event.inputs.slot_a || '1' }}

      - name: Shorts 2 — second slot
        run: python generate.py --auto --upload --slot ${{ github.event.inputs.slot_b || '3' }}

      - name: Fetch analytics and send daily report
        run: |
          python3 -c "
          from dotenv import load_dotenv
          load_dotenv()
          from youtube_uploader import _get_credentials
          from googleapiclient.discovery import build
          from analytics_tracker import fetch_and_update_stats, send_daily_report, check_copyright_issues
          try:
              creds = _get_credentials()
              yt = build('youtube', 'v3', credentials=creds) if creds else None
              if yt:
                  fetch_and_update_stats(yt)
                  check_copyright_issues(yt)
              send_daily_report(youtube=yt)
          except Exception as e:
              print(f'[WARN] Analytics step failed: {e}')
          "
        continue-on-error: true

      - name: Commit updated topic tracking files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json topics.json pexels_seen_ids.json today_topics.json video_log.json || true
          git diff --staged --quiet || git commit -m "chore: update topic tracking [skip ci]"
          git pull --rebase || true
          git push
