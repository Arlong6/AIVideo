name: Daily Video Generation

on:
  schedule:
    - cron: '0 18 * * *'   # 02:00 AM Taiwan (UTC+8) = 18:00 UTC
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write        # for committing used_topics.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up credentials
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          CLIENT_SECRETS_B64: ${{ secrets.CLIENT_SECRETS_B64 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python3 -c "
          import base64, os
          open('youtube_token.pickle','wb').write(base64.b64decode(os.environ['YOUTUBE_TOKEN_B64']))
          open('client_secrets.json','wb').write(base64.b64decode(os.environ['CLIENT_SECRETS_B64']))
          "
          printf "ANTHROPIC_API_KEY=%s\nPEXELS_API_KEY=%s\nELEVENLABS_API_KEY=%s\nPIXABAY_API_KEY=%s\n" \
            "$ANTHROPIC_API_KEY" "$PEXELS_API_KEY" "$ELEVENLABS_API_KEY" "$PIXABAY_API_KEY" > .env

      - name: Video 1 — slot 1 (publishes at 10:00 AM Taiwan)
        run: python generate.py --auto --upload --slot 1

      - name: Video 2 — slot 2 (publishes at 18:00 PM Taiwan)
        run: python generate.py --auto --upload --slot 2

      - name: Commit updated topic tracking files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json topics.json pexels_seen_ids.json || true
          git diff --staged --quiet || git commit -m "chore: update topic tracking [skip ci]"
          git push
